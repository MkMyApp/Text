<!DOCTYPE html>
<html lang="ja">
<head>
<title>Text</title>
<meta charset="UTF-8">
<style>
body{
  font-family: sans-serif;
  margin: 20px;
}

#status{
  font-family: monospace;
  font-size:20px;
  margin: 20px;
}

#status span{
  margin: 10px;
}

textarea {
  font-family: monospace; 
  font-size: 16px; 
  width: 640px;
  height: 480px;
  min-width: 320px;
  min-height: 100px;
  line-height: 1.2;
  padding: 6px 8px;
  border: 1px solid #c0c0c0;
  box-sizing: border-box;
}

button{
  font-family: monospace;
  font-size: 20px;
  width:120px;
  padding: 16px;
  margin: 10px;
}

</style>

<!-- PWA・モバイル表示のための追加要素 -->
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

</head>
<body>
<h1>Text</h1> 
<p id="status">
  <span id="filename">File: (none)</span>
  <span id="modified"></span>
  <span id="linecount">Line: 1</span>
  <span id="charcount">Chars: 0</span>
</p>
<button onclick="loadFile()">読込</button>
<button onclick="saveFile()">保存</button>
<br>
<textarea id="text">
</textarea>
<script>
let currentFileName = "text.txt";
let modified = false;
let fileHandle = null; // ファイルハンドルを保持する変数

// ファイル名とタイトルの表示更新
function updateFileName(){
  document.getElementById("filename").textContent =
    "File: " + currentFileName;

  document.getElementById("title").textContent =
    "Text: " + currentFileName;
}

// 変更マーク（*）の表示更新
function updateModified(){
  document.getElementById("modified").textContent =
    modified ? "*" : "";
}

// 行数・文字数の表示更新
function updateStatus(){
  const text = document.getElementById("text").value;
  const lines = text.length === 0 ? 1 : text.split("\n").length;
  const chars = text.length;

  document.getElementById("linecount").textContent = "Line: " + lines;
  document.getElementById("charcount").textContent = "Chars: " + chars;
}

// 変更フラグを立てる
function setModified(){
  modified = true;
  updateModified();
}

// ファイルを開く
async function loadFile(){
  try{
    const [handle] = await window.showOpenFilePicker({
      types: [{
        description: "Text Files",
        accept: { "text/plain": [".txt", ".html"] }
      }]
    });

    fileHandle = handle; // ハンドルを保存
    currentFileName = handle.name;
    updateFileName();

    const file = await handle.getFile();
    const text = await file.text();

    document.getElementById("text").value = text;

    modified = false;
    updateModified();
    updateStatus();

  }catch(e){
    console.log(e);
  }
}

// ダイアログを開いて保存する
async function saveFile() {
  const text = document.getElementById("text").value;

  try {
    // 常にファイル保存ダイアログを開く
    const handle = await window.showSaveFilePicker({
      suggestedName: currentFileName,
      types: [{
        description: "Text Files",
        accept: { "text/plain": [".txt", ".html"] }
      }]
    });

    // 選択されたファイルハンドルを保存
    fileHandle = handle;
    currentFileName = handle.name;
    updateFileName();

    // 書き込み処理
    const writable = await handle.createWritable();
    await writable.write(text);
    await writable.close();

    modified = false;
    updateModified();
    updateStatus();
    
  } catch (e) {
    // ユーザーがキャンセルした場合
    console.log("保存がキャンセルされました", e);
  }
}

// 入力イベント
document.getElementById("text").addEventListener("input", function(){
  setModified();
  updateStatus();
});

const textarea = document.getElementById("text");

// ドラッグオーバー
textarea.addEventListener("dragover", function(e){
  e.preventDefault();
});

// ドロップ処理
textarea.addEventListener("drop", async function(e){
  e.preventDefault();
  const files = e.dataTransfer.files;
  if (files.length === 0) return;
  const file = files[0];

  if (!file.type.startsWith("text") && !file.name.match(/\.(txt|html)$/)) {
    alert("テキストファイルのみ対応しています");
    return;
  }

  fileHandle = null; // ドロップ時は上書き不可にする
  currentFileName = file.name;
  updateFileName();

  const text = await file.text();
  document.getElementById("text").value = text;

  modified = false;
  updateModified();
  updateStatus();
});

</script>

<!--　PWAのための追加要素 -->
<script src="sw-register.js"></script>

</body>
</html>
